<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 全ブロック対応 JSONハック生成機</title>
  <script src="https://cloudflare.com"></script>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background: #f0f4f8; color: #333; }
    h1 { color: #855cd6; text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
    .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    button { background: #855cd6; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
    button:hover { background: #724bb7; }
    .status { text-align: center; color: #444; font-weight: bold; margin: 15px 0; font-size: 15px; background: #e2e8f0; padding: 10px; border-radius: 8px; }
    
    .block-item { background: #f9f9f9; border-left: 5px solid #855cd6; padding: 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; display: flex; flex-direction: column; gap: 8px; }
    .block-info { font-size: 12px; color: #666; font-weight: bold; }
    .input-row { display: flex; align-items: center; gap: 10px; }
    .input-label { font-size: 14px; background: #eee; padding: 4px 8px; border-radius: 4px; min-width: 80px; text-align: center; }
    .hack-input { flex: 1; padding: 8px; font-size: 15px; border: 2px solid #ddd; border-radius: 6px; }
    .hack-input:focus { border-color: #855cd6; outline: none; }
    .sprite-name { background: #855cd6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 5px; }
  </style>
</head>
<body>

  <h1>🧪 Scratch 全ブロック対応 JSONハック生成機</h1>
  <div class="subtitle">どんなブロックの文字・数字でも自由に変えられます</div>

  <div class="box">
    <h3>1. sb3ファイルを選択</h3>
    <input type="file" id="fileInput" accept=".sb3">
  </div>

  <div class="status" id="statusText">ファイルを読み込んでください</div>

  <div class="box" id="editorBox" style="display:none;">
    <h3>2. 見つかったブロックの入力欄をハック！</h3>
    <p style="font-size:13px; color:#666;">※文字や数字を自由に変えてみよう！</p>
    
    <div id="blockList"></div>
    
    <button id="downloadBtn">⚡ 改造されたsb3を書き出す</button>
  </div>

  <script>
    let loadedZip = null;
    let projectJson = null;
    let inputReferences = [];

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0]; // 最初のファイルを取得
      if (!file) return;

      document.getElementById('statusText').innerText = "ファイルを展開中...";
      document.getElementById('editorBox').style.display = 'none';
      const blockListDiv = document.getElementById('blockList');
      blockListDiv.innerHTML = "";
      inputReferences = [];

      // iPad/iPhoneでも確実にバイナリとして読むためのReader
      const reader = new FileReader();
      
      reader.onload = async (event) => {
        try {
          const arrayBuffer = event.target.result;
          const zip = new JSZip();
          
          // ArrayBufferを使って確実にZIPを展開
          loadedZip = await zip.loadAsync(arrayBuffer);
          
          const jsonFile = loadedZip.file("project.json");
          if (!jsonFile) {
            document.getElementById('statusText').innerText = "エラー：ファイルの中に project.json がありません。";
            return;
          }

          const jsonText = await jsonFile.async("text");
          projectJson = JSON.parse(jsonText);

          let inputIdCounter = 0;

          if (projectJson && Array.isArray(projectJson.targets)) {
            for (const target of projectJson.targets) {
              const spriteName = target.name || "スプライト";

              if (target.blocks && typeof target.blocks === 'object') {
                for (const blockId in target.blocks) {
                  const block = target.blocks[blockId];
                  
                  if (!block || block.shadow || !block.inputs || typeof block.inputs !== 'object') continue;

                  for (const inputKey in block.inputs) {
                    const inputData = block.inputs[inputKey];
                    
                    // Scratch 3.0の一般的なブロック入力欄データ構造
                    if (Array.isArray(inputData) && inputData.length >= 2 && Array.isArray(inputData[1])) {
                      const valueContainer = inputData[1];
                      
                      if (valueContainer.length >= 2) {
                        const currentValue = valueContainer[1];
                        const uniqueInputId = `hack_input_${inputIdCounter++}`;

                        inputReferences.push({
                          elementId: uniqueInputId,
                          targetArray: valueContainer,
                          index: 1
                        });

                        const cleanOpcode = (block.opcode || "unknown").replace(/[a-z]+_/, ''); 
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'block-item';
                        itemDiv.innerHTML = `
                          <div class="block-info">
                            <span class="sprite-name">${spriteName}</span>
                            ブロック: <span style="color:#855cd6;">${cleanOpcode}</span> ＞ 項目: [${inputKey}]
                          </div>
                          <div class="input-row">
                            <span class="input-label">設定値:</span>
                            <input type="text" class="hack-input" id="${uniqueInputId}" value="${currentValue}">
                          </div>
                        `;
                        blockListDiv.appendChild(itemDiv);
                      }
                    }
                  }
                }
              }
            }
          }

          if (inputReferences.length === 0) {
            document.getElementById('statusText').innerText = "読み込み完了。変更可能な入力欄が見つかりませんでした。別のsb3ファイルで試してみてね！";
          } else {
            document.getElementById('editorBox').style.display = 'block';
            document.getElementById('statusText').innerText = `成功！${inputReferences.length}個の入力欄を見つけました！`;
          }

        } catch (err) {
          console.error(err);
          document.getElementById('statusText').innerText = "エラー：ファイルを開く処理で問題が発生しました。(" + err.message + ")";
        }
      };

      // ファイルの読み込みを開始
      reader.readAsArrayBuffer(file);
    });

    // 書き出し・ダウンロード処理
    document.getElementById('downloadBtn').addEventListener('click', async () => {
      if (!loadedZip || !projectJson) return;

      document.getElementById('statusText').innerText = "改造データを生成中...";

      for (const ref of inputReferences) {
        const inputEl = document.getElementById(ref.elementId);
        if (inputEl) {
          ref.targetArray[ref.index] = inputEl.value;
        }
      }

      loadedZip.file("project.json", JSON.stringify(projectJson));
      const blob = await loadedZip.generateAsync({ type: "blob" });

      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = "hacked_project.sb3";
      link.click();

      document.getElementById('statusText').innerText = "ハック完了！改造版のダウンロードに成功しました！";
    });
  </script>
</body>
</html>
